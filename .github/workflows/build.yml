name: Build DropBeam

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

# Pinned Tailscale version bundled into the installers.
# Update this when you want to ship a newer Tailscale runtime.
env:
  TAILSCALE_VERSION: "1.80.3"

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # ── Download Tailscale binaries ────────────────────────────────────────
      # macOS builds x64 and arm64 separately so each gets the right binary.

      - name: Download Tailscale (darwin/amd64)
        run: |
          mkdir -p bin/mac-x64
          curl -fsSL "https://pkgs.tailscale.com/stable/tailscale_${TAILSCALE_VERSION}_darwin_amd64.tgz" \
            | tar -xz -C bin/mac-x64 --strip-components=1
          # Keep only the two CLI binaries
          find bin/mac-x64 -not \( -name 'tailscale' -o -name 'tailscaled' \) -not -type d -delete
          chmod +x bin/mac-x64/tailscale bin/mac-x64/tailscaled
          echo "amd64 binaries:"
          ls -lh bin/mac-x64/

      - name: Download Tailscale (darwin/arm64)
        run: |
          mkdir -p bin/mac-arm64
          curl -fsSL "https://pkgs.tailscale.com/stable/tailscale_${TAILSCALE_VERSION}_darwin_arm64.tgz" \
            | tar -xz -C bin/mac-arm64 --strip-components=1
          find bin/mac-arm64 -not \( -name 'tailscale' -o -name 'tailscaled' \) -not -type d -delete
          chmod +x bin/mac-arm64/tailscale bin/mac-arm64/tailscaled
          echo "arm64 binaries:"
          ls -lh bin/mac-arm64/

      # ── Build x64 ──────────────────────────────────────────────────────────

      - name: Stage Tailscale binaries for x64 build
        run: |
          mkdir -p bin/mac
          cp bin/mac-x64/tailscale bin/mac-x64/tailscaled bin/mac/

      - name: Build macOS x64 DMG (artifact only)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npx electron-builder --mac dmg --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build macOS x64 DMG (publish release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx electron-builder --mac dmg --x64 --publish onTag
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Build arm64 ────────────────────────────────────────────────────────

      - name: Stage Tailscale binaries for arm64 build
        run: |
          cp bin/mac-arm64/tailscale bin/mac-arm64/tailscaled bin/mac/

      - name: Build macOS arm64 DMG (artifact only)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npx electron-builder --mac dmg --arm64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build macOS arm64 DMG (publish release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx electron-builder --mac dmg --arm64 --publish onTag
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DropBeam-mac
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 30

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # ── Download Tailscale binaries ────────────────────────────────────────

      - name: Download Tailscale (windows/amd64)
        shell: pwsh
        run: |
          $ver = $env:TAILSCALE_VERSION
          $url = "https://pkgs.tailscale.com/stable/tailscale_${ver}_windows_amd64.zip"
          $zip = "tailscale-win.zip"
          $tmp = "tailscale-win-tmp"

          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $zip -TimeoutSec 120

          Expand-Archive -Path $zip -DestinationPath $tmp -Force

          New-Item -ItemType Directory -Force -Path "bin\win" | Out-Null

          # Locate and copy the two executables (they may be in a subdirectory)
          Get-ChildItem -Path $tmp -Recurse -Filter "tailscale.exe"  | Select-Object -First 1 | Copy-Item -Destination "bin\win\"
          Get-ChildItem -Path $tmp -Recurse -Filter "tailscaled.exe" | Select-Object -First 1 | Copy-Item -Destination "bin\win\"

          Remove-Item -Recurse -Force $tmp, $zip

          Write-Host "Windows binaries:"
          Get-ChildItem "bin\win\"

      # ── Build ──────────────────────────────────────────────────────────────

      - name: Build Windows installer (artifact only)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npx electron-builder --win nsis --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build Windows installer (publish release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx electron-builder --win nsis --publish onTag
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: DropBeam-win
          path: dist/*.exe
          retention-days: 30

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install dependencies
        run: npm install
      - name: Sync web UI into mobile webDir
        run: npm run sync:web
      - name: Add Capacitor Android platform
        run: npx cap add android
      - name: Sync Capacitor
        run: npx cap sync android
      - name: Build APK
        run: cd android && ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DropBeam-android
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
