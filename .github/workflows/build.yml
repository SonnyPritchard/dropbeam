name: Build DropBeam

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

# Pinned Tailscale version bundled into the installers.
# Built from source in CI (no brittle CDN filename assumptions).
env:
  TAILSCALE_VERSION: "1.96.4"

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: npm install

      # ── Build bundled Tailscale binaries from source ───────────────────────
      # macOS builds x64 and arm64 separately so each gets the right binary.

      - name: Build Tailscale (darwin/amd64)
        run: |
          mkdir -p bin/mac-x64
          export GOPATH="$PWD/.gopath"
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go install tailscale.com/cmd/tailscale@v${TAILSCALE_VERSION}
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go install tailscale.com/cmd/tailscaled@v${TAILSCALE_VERSION}
          cp "$GOPATH/bin/darwin_amd64/tailscale" "$GOPATH/bin/darwin_amd64/tailscaled" bin/mac-x64/
          chmod +x bin/mac-x64/tailscale bin/mac-x64/tailscaled
          echo "amd64 binaries:"
          ls -lh bin/mac-x64/

      - name: Build Tailscale (darwin/arm64)
        run: |
          mkdir -p bin/mac-arm64
          export GOPATH="$PWD/.gopath"
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go install tailscale.com/cmd/tailscale@v${TAILSCALE_VERSION}
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go install tailscale.com/cmd/tailscaled@v${TAILSCALE_VERSION}

          # On arm64 mac runners, same-arch installs may land in GOPATH/bin,
          # while explicit cross-arch installs land in GOPATH/bin/<goos>_<goarch>.
          TS_BIN_DIR="$GOPATH/bin/darwin_arm64"
          if [ ! -f "$TS_BIN_DIR/tailscale" ]; then TS_BIN_DIR="$GOPATH/bin"; fi

          cp "$TS_BIN_DIR/tailscale" "$TS_BIN_DIR/tailscaled" bin/mac-arm64/
          chmod +x bin/mac-arm64/tailscale bin/mac-arm64/tailscaled
          echo "arm64 binaries:"
          ls -lh bin/mac-arm64/

      # ── Build x64 ──────────────────────────────────────────────────────────

      - name: Stage Tailscale binaries for x64 build
        run: |
          mkdir -p bin/mac
          cp bin/mac-x64/tailscale bin/mac-x64/tailscaled bin/mac/

      - name: Build macOS x64 DMG (artifact only)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npx electron-builder --mac dmg --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build macOS x64 DMG (publish release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx electron-builder --mac dmg --x64 --publish onTag
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Build arm64 ────────────────────────────────────────────────────────

      - name: Stage Tailscale binaries for arm64 build
        run: |
          cp bin/mac-arm64/tailscale bin/mac-arm64/tailscaled bin/mac/

      - name: Build macOS arm64 DMG (artifact only)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npx electron-builder --mac dmg --arm64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build macOS arm64 DMG (publish release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx electron-builder --mac dmg --arm64 --publish onTag
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DropBeam-mac
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 30

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: npm install

      # ── Build bundled Tailscale binaries from source ───────────────────────

      - name: Build Tailscale (windows/amd64)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "bin\win" | Out-Null
          $env:GOBIN = "$pwd\bin\win"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CGO_ENABLED = "0"

          go install tailscale.com/cmd/tailscale@v$env:TAILSCALE_VERSION
          go install tailscale.com/cmd/tailscaled@v$env:TAILSCALE_VERSION

          Write-Host "Windows binaries:"
          Get-ChildItem "bin\win\"

      # ── Build ──────────────────────────────────────────────────────────────

      - name: Build Windows installer (artifact only)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npx electron-builder --win nsis --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build Windows installer (publish release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx electron-builder --win nsis --publish onTag
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: DropBeam-win
          path: dist/*.exe
          retention-days: 30

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install dependencies
        run: npm install
      - name: Sync web UI into mobile webDir
        run: npm run sync:web
      - name: Add Capacitor Android platform
        run: npx cap add android
      - name: Sync Capacitor
        run: npx cap sync android
      - name: Build APK
        run: cd android && ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DropBeam-android
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
