name: Build DropBeam

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build macOS DMG
        run: npx electron-builder --mac dmg
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: DropBeam-mac
          path: dist/*.dmg
          retention-days: 30

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npx electron-builder --win nsis
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: DropBeam-win
          path: dist/*.exe
          retention-days: 30
