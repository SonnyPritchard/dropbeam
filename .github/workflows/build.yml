name: Build DropBeam

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build macOS DMG (artifact only)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npx electron-builder --mac dmg --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build macOS DMG (publish release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx electron-builder --mac dmg --publish onTagOnly
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: DropBeam-mac
          path: dist/*.dmg
          retention-days: 30

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer (artifact only)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npx electron-builder --win nsis --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build Windows installer (publish release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx electron-builder --win nsis --publish onTagOnly
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: DropBeam-win
          path: dist/*.exe
          retention-days: 30
