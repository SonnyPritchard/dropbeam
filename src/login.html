<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DropBeam — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: #2e2e40;
      --accent: #6366f1;
      --accent-glow: rgba(99,102,241,0.3);
      --text: #e2e8f0;
      --text-muted: #64748b;
      --success: #22c55e;
      --danger: #ef4444;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-app-region: drag;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 40px;
      width: 380px;
      max-width: 95vw;
      -webkit-app-region: no-drag;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 20px;
      margin-bottom: 28px;
      justify-content: center;
    }
    .logo svg { color: var(--accent); }
    .tabs {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .tab.active { background: var(--accent); color: #fff; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--text-muted); opacity: .6; }
    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 50px;
    }
    .btn-submit:hover:not(:disabled) { background: #5254cc; }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    .btn-submit.loading .spinner { display: inline-block; }
    .btn-submit.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg {
      background: rgba(239,68,68,0.12);
      border: 1px solid var(--danger);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--danger);
      margin-top: 14px;
      display: none;
    }
    .error-msg.visible { display: block; }
    .panel { display: none; }
    .panel.active { display: block; }
    .footer-note {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 20px;
      opacity: .6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
      DropBeam
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
      <button class="tab" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- Sign In panel -->
    <div class="panel active" id="panel-signin">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signin-email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signin-password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn-submit" id="signin-btn" onclick="doSignIn()">
        <span class="btn-text">Sign In</span>
        <span class="spinner"></span>
      </button>
      <div class="error-msg" id="signin-error"></div>
    </div>

    <!-- Create Account panel -->
    <div class="panel" id="panel-signup">
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="signup-name" placeholder="Sonny" autocomplete="name" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="••••••••" autocomplete="new-password" />
      </div>
      <button class="btn-submit" id="signup-btn" onclick="doSignUp()">
        <span class="btn-text">Create Account</span>
        <span class="spinner"></span>
      </button>
      <div class="error-msg" id="signup-error"></div>
    </div>

    <div class="footer-note">Your files never touch our servers · Peer-to-peer</div>
  </div>

  <script src="login.js"></script>
</body>
</html>
